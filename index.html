<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MYC Events</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f5f7f9;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      max-width: 320px;
    }
    .title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 10px;
    }
    .event {
      margin-bottom: 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    .event:last-child {
      border-bottom: none;
    }
    .event-title {
      font-size: 14px;
      font-weight: 600;
    }
    .date {
      color: #555;
      font-size: 13px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="title">🌊 Coming Up at MYC</div>
