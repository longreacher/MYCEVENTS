<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MYC Bookings</title>
<style>
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f5f7f9;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  width: 800px;
  max-width: 100%;
  margin: 0 auto;
}

.title {
  font-weight: 700;
  font-size: 20px;
  text-align: center;
  margin-bottom: 10px;
}

.event {
  margin-bottom: 10px;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
  text-align: center;
}

.event:last-child {
  border-bottom: none;
}

.event-title {
  font-size: 14px;
  font-weight: 600;
}

.date {
  color: #555;
  font-size: 13px;
  margin-top: 2px;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">🔧 Upcoming Equipment Bookings🔧</div>
  <div class="title">⬇️⬇️ Scroll to the bottom of the page to book the gin pole or mooring mover ⬇️⬇️</div>
   <div class="title">  </div>
  <div id="events">Loading…</div>
</div>

<script>

const calendars = [
  "https://calendar.google.com/calendar/ical/mooringmover%40gmail.com/public/basic.ics",
  "https://calendar.google.com/calendar/ical/68aa4fb41866fbfc2463ff91e5c4c89c3aef03ed78aed2973da900f83a1bf3c6%40group.calendar.google.com/public/basic.ics"
];

const proxy = url =>
  "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url);

async function loadEvents() {
  const container = document.getElementById("events");

  try {
    let allEvents = [];

    for (let cal of calendars) {
      const res = await fetch(proxy(cal));
      if (!res.ok) continue;

      const text = await res.text();
      const events = parseICS(text);

      allEvents = allEvents.concat(events);
    }

    const upcoming = allEvents
      .filter(e => e.start instanceof Date && !isNaN(e.start))
      .filter(e => e.start > new Date())   // ✅ proper future filter
      .sort((a, b) => a.start - b.start)
      .slice(0, 5);

    if (upcoming.length === 0) {
      container.innerHTML = "No bookings";
      return;
    }

    container.innerHTML = upcoming.map(e => {
      const formattedDate = e.start.toLocaleString('en-CA', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });

      return `
        <div class="event">
          <div class="event-title">${formatTitle(e.title)}</div>
          <div class="date">${formattedDate}</div>
        </div>
      `;
    }).join("");

  } catch (err) {
    container.innerHTML = "Unable to load bookings";
    console.error(err);
  }
}

/* ✅ Title formatting */

function formatTitle(title) {
  if (!title.includes("•")) return title;

  const parts = title.split("•");
  if (parts.length !== 2) return title;

  const name = parts[0].trim();
  const action = parts[1].toLowerCase();

  if (action.includes("gin pole")) {
    return "🏗️ Gin Pole - " + name;
  }

  if (action.includes("mooring mover")) {
    return "⚓ Mooring Mover - " + name;
  }

  return title;
}

/* ✅ ICS parsing */

function parseICS(data) {
  const events = [];
  const chunks = data.split("BEGIN:VEVENT");

  chunks.forEach(chunk => {
    const title = match(chunk, "SUMMARY");
    const startRaw = matchDate(chunk);

    if (!title || !startRaw) return;

    const date = parseDate(startRaw);

    if (!(date instanceof Date) || isNaN(date)) return;

    events.push({
      title,
      start: date
    });
  });

  return events;
}

/* ✅ Match all valid date formats */
function matchDate(text) {
  const match = text.match(/DTSTART[^:]*:(\d{8}T\d{6}Z?|\d{8})/);
  return match ? match[1] : null;
}

/* ✅ THE KEY FIX: treat everything as local */
function parseDate(str) {

  let date;

  // All-day event
  if (str.length === 8) {
    date = new Date(
      Number(str.substring(0,4)),
      Number(str.substring(4,6)) - 1,
      Number(str.substring(6,8))
    );
    return date;
  }

  // Remove Z if present (we're overriding timezone anyway)
  if (str.endsWith("Z")) {
    str = str.slice(0, -1);
  }

  date = new Date(
    Number(str.substring(0,4)),
    Number(str.substring(4,6)) - 1,
    Number(str.substring(6,8)),
    Number(str.substring(9,11)),
    Number(str.substring(11,13)),
    Number(str.substring(13,15))
  );

  // ✅ FIX: shift back 3 hours
  date.setHours(date.getHours() - 3);

  return date;
}


function match(text, field) {
  const regex = new RegExp(field + ":(.*)");
  const match = text.match(regex);
  return match ? match[1].trim() : null;
}

loadEvents();

</script>

</body>
</html>
